<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  min-height: 100vh;
  margin: 0;
  display: flex;
  flex-direction: row;
}

    .left-side {
      flex: 1;
      background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
        url('https://images.unsplash.com/photo-1555066931-4365d14bab8c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1050&q=80')
        no-repeat center center;
      background-size: cover;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .left-side h1 {
      font-size: 2.5rem;
      text-align: center;
      max-width: 80%;
    }

    .right-side {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;   /* changed from center */
  background-color: #f9f9f9;
  overflow-y: auto;
  padding: 40px 0;
}

    .form-container {
      background-color: white;
      padding: 2rem 3rem;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
    }

    label {
      font-weight: 500;
      color: #444;
      display: block;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      transition: border 0.3s;
      font-size: 1rem;
    }

    input:focus,
    select:focus {
      border-color: #667eea;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s;
      font-weight: 600;
    }

    button:hover {
      background-color: #5a67d8;
    }

    p {
      text-align: center;
      margin-top: 1rem;
      color: #333;
    }

    a {
      color: #667eea;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }

    #internFields {
      display: none;
    }

    #error-message {
      color: red;
      font-weight: 500;
      margin-bottom: 10px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .left-side {
        display: none;
      }
      .right-side {
        flex: 1;
      }
    }
  </style>
</head>

<body>

  <div class="left-side">
    <h1>Welcome to InternConnect – Learn, Connect, and Succeed</h1>
  </div>

  <div class="right-side">
    <div class="form-container">
      <h2>Register</h2>

      <form id="registerForm">

        <p id="error-message"></p>
        <p id="success-message" style="color: green; font-weight: 500; text-align: center;"></p>

        <label>Name:</label>
        <input type="text" name="name" required />

        <label>College Email:</label>
        <input type="email" name="email" required />

        <label>Password:</label>
        <input type="password" name="password" required />

        <label>Branch:</label>
        <input type="text" name="branch" required />

        <label>Year:</label>
        <input type="text" name="year" required />

        <label>Role:</label>
        <select name="role" id="role" required>
          <option value="">Select role</option>
          <option value="student">Student</option>
          <option value="intern">Intern</option>
        </select>

        <div id="internFields">
          <label>Internship Role:</label>
          <input type="text" name="internRole">

          <label>Company:</label>
          <input type="text" name="internCompany">
        </div>

        <button type="submit">Register</button>
      </form>

      <p>Already have an account? <a href="/">Login here</a></p>

    </div>
  </div>

<script>

// Toggle intern fields
document.getElementById('role')
  .addEventListener('change', function () {
    document.getElementById('internFields').style.display =
      this.value === 'intern' ? 'block' : 'none';
  });

// Handle form submission
document.getElementById('registerForm')
  .addEventListener('submit', async function (e) {

  e.preventDefault();

  const formData = new FormData(this);
  const data = Object.fromEntries(formData.entries());

  try {
    const res = await fetch('/register', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (!res.ok) {
      document.getElementById('error-message').innerText =
        result.error;
      return;
    }

    // Success
    window.location.href = '/';

  } catch (err) {
    document.getElementById('error-message').innerText =
      'Something went wrong. Try again.';
  }
});

</script>

</body>
</html>
