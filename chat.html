<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student-Intern Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      color: black;
    }

    header {
      background-color: #0077b6;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav ul li a:hover {
      text-decoration: underline;
    }

    .main {
      display: flex;
      height: calc(100vh - 80px);
    }

    .sidebar {
      width: 25%;
      background: #ffffff;
      padding: 15px;
      border-right: 2px solid #ddd;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
      overflow-y: auto;
    }

    .sidebar h3 {
      color: #0077b6;
      text-align: center;
      margin-bottom: 10px;
      border-bottom: 2px solid #ddd;
      padding-bottom: 10px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar ul li {
      padding: 12px;
      background: #f1f1f1;
      margin: 8px 0;
      cursor: pointer;
      border-radius: 8px;
      text-align: center;
      transition: background 0.3s;
    }

    .sidebar ul li:hover {
      background: #0077b6;
      color: white;
    }

    .chat-container {
      width: 75%;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      border-left: 2px solid #ddd;
    }

    .chat-header {
      background: #0077b6;
      padding: 15px;
      text-align: center;
      color: white;
      font-weight: bold;
      border-bottom: 2px solid #005f8c;
    }

    .chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #f9f9f9;
      border: 2px solid #ddd;
      border-radius: 10px;
      margin: 10px;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
      max-height: calc(100vh - 200px);
      display: flex;
      flex-direction: column;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #f1f1f1;
      border-top: 2px solid #ddd;
    }

    .input-box input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 20px;
      outline: none;
      background: #fff;
      color: #333;
      border: 1px solid #ddd;
    }

    .input-box button {
      padding: 12px 15px;
      border: none;
      background: #0077b6;
      color: white;
      cursor: pointer;
      border-radius: 20px;
      margin-left: 10px;
      transition: background 0.3s;
    }

    .input-box button:hover {
      background: #005f8c;
    }

    .message {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
      word-wrap: break-word;
    }

    .sent {
      background: #95bacd;
      color: white;
      align-self: flex-end;
      border-radius: 18px 18px 0 18px;
      max-width: 50%;
    }

    .received {
      background: #ffffff;
      color: black;
      align-self: flex-start;
      border-radius: 18px 18px 18px 0;
      border: 1px solid #ddd;
      max-width: 50%;
    }
  </style>
</head>
<body>

  <header>
    <h1>InternConnect</h1>
    <nav>
      <ul>
        <li><a href="homepage.html">Home</a></li>
        <li><a href="myrequests.html">My Requests</a></li>
        <li><a href="chat.html">Chats</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="#">Logout</a></li>
      </ul>
    </nav>
  </header>

  <div class="main">
    <div class="sidebar">
      <h3>Connected Interns</h3>
      <ul id="intern-list">
        <!-- Will be filled dynamically -->
      </ul>
    </div>

    <div class="chat-container">
      <div class="chat-header" id="chat-title">Select an Intern to Chat</div>
      <div class="chat-box" id="chat-box"></div>
      <div class="input-box">
        <input type="text" id="message-input" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
  const socket = io("http://localhost:3000"); // adjust for production
  const studentId = localStorage.getItem("loggedInStudentId");
  let currentChat = '';

  async function loadConnectedInterns() {
    try {
      const res = await fetch('/api/acceptedInterns');
      if (!res.ok) throw new Error('Failed to load connected interns');

      const interns = await res.json();
      const list = document.getElementById('intern-list');
      list.innerHTML = '';

      if (interns.length === 0) {
        list.innerHTML = '<li>No accepted connections yet.</li>';
        return;
      }

      interns.forEach(intern => {
        const li = document.createElement('li');
        li.textContent = intern.name;
        li.onclick = () => openChat(intern);
        li.style.cursor = 'pointer';
        li.classList.add('student-item');
        list.appendChild(li);
      });
    } catch (err) {
      console.error('Error:', err);
      document.getElementById('intern-list').innerHTML = '<li>Error loading interns.</li>';
    }
  }

  function openChat(intern) {
  currentChat = intern._id;
  document.getElementById('chat-title').innerText = `Chat with ${intern.name}`;
  document.getElementById('chat-box').innerHTML = '';
  document.title = `Chat with ${intern.name}`;

  const roomId = [studentId, currentChat].sort().join('-');
  socket.emit('joinRoom', { senderId: studentId, receiverId: currentChat });  // Good now!

  fetch(`/api/messages/${studentId}/${currentChat}`)
    .then(res => res.json())
    .then(messages => {
      const chatBox = document.getElementById('chat-box');
      messages.forEach(msg => {
        const msgDiv = document.createElement('div');
        msgDiv.className = msg.senderId === studentId ? 'message sent' : 'message received';
        msgDiv.innerHTML = `<strong>${msg.senderId === studentId ? 'You' : intern.name}:</strong> ${msg.message}`;
        chatBox.appendChild(msgDiv);
      });
      chatBox.scrollTop = chatBox.scrollHeight;
    });
}


  function sendMessage() {
    const input = document.getElementById('message-input');
    const message = input.value.trim();
    if (message === '' || currentChat === '') return;

    const roomId = [studentId, currentChat].sort().join('-');
    socket.emit('sendMessage', {
      roomId,
      senderId: studentId,
      receiverId: currentChat,
      message
    });

    const chatBox = document.getElementById('chat-box');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message sent';
    msgDiv.innerHTML = `<strong>You:</strong> ${message}`;
    chatBox.appendChild(msgDiv);
    input.value = '';
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  socket.on('receiveMessage', (data) => {
    if (data.senderId !== currentChat) return;
    const chatBox = document.getElementById('chat-box');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message received';
    msgDiv.innerHTML = `<strong>Intern:</strong> ${data.message}`;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
  });

  window.onload = () => {
    loadConnectedInterns();
    // Removed: chatBox.scrollTop = chatBox.scrollHeight;
  };
</script>
