<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student-Intern Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      color: black;
    }

    header {
      background-color: #0077b6;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav ul li a:hover {
      text-decoration: underline;
    }

    .main {
      display: flex;
      height: calc(100vh - 80px);
    }

    .sidebar {
      width: 25%;
      background: #ffffff;
      padding: 15px;
      border-right: 2px solid #ddd;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
      overflow-y: auto;
    }

    .sidebar h3 {
      color: #0077b6;
      text-align: center;
      margin-bottom: 10px;
      border-bottom: 2px solid #ddd;
      padding-bottom: 10px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar ul li {
      padding: 12px;
      background: #f1f1f1;
      margin: 8px 0;
      cursor: pointer;
      border-radius: 8px;
      text-align: center;
      transition: background 0.3s;
    }

    .sidebar ul li:hover {
      background: #0077b6;
      color: white;
    }

    .chat-container {
      width: 75%;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      border-left: 2px solid #ddd;
    }

    .chat-header {
      background: #0077b6;
      padding: 15px;
      text-align: center;
      color: white;
      font-weight: bold;
      border-bottom: 2px solid #005f8c;
    }

    .chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #f9f9f9;
      border: 2px solid #ddd;
      border-radius: 10px;
      margin: 10px;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
      max-height: calc(100vh - 200px);
      display: flex;
      flex-direction: column;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #f1f1f1;
      border-top: 2px solid #ddd;
    }

    .input-box input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 20px;
      outline: none;
      background: #fff;
      color: #333;
      border: 1px solid #ddd;
    }

    .input-box button {
      padding: 12px 15px;
      border: none;
      background: #0077b6;
      color: white;
      cursor: pointer;
      border-radius: 20px;
      margin-left: 10px;
      transition: background 0.3s;
    }

    .input-box button:hover {
      background: #005f8c;
    }

    .message {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
      word-wrap: break-word;
    }

    .sent {
      background: #95bacd;
      color: white;
      align-self: flex-end;
      border-radius: 18px 18px 0 18px;
      max-width: 50%;
    }

    .received {
      background: #ffffff;
      color: black;
      align-self: flex-start;
      border-radius: 18px 18px 18px 0;
      border: 1px solid #ddd;
      max-width: 50%;
    }
    .student-item {
  padding: 10px;
  border-radius: 8px;
  margin: 5px 0;
  cursor: pointer;
  transition: 0.2s;
}

.student-item:hover {
  background-color: #e0e0e0;
}

.student-item.active-chat {
  background-color: #0d6efd;
  color: white;
}
  </style>
</head>
<body>

  <header>
    <h1>InternConnect</h1>
    <nav>
      <ul>
        <li><a href="homepage.html">Home</a></li>
        <li><a href="myrequests.html">My Requests</a></li>
        <a href="internships.html">InternOpenings</a>
        <li><a href="chat.html">Chats</a></li>
        <li><a href="profile.html">Profile</a></li>
        <a href="/logout">Logout</a>
      </ul>
    </nav>
  </header>

  <div class="main">
    <div class="sidebar">
      <h3>Connected Interns</h3>
      <ul id="intern-list">
        <!-- Will be filled dynamically -->
      </ul>
    </div>

    <div class="chat-container">
      <div class="chat-header" id="chat-title">Select an Intern to Chat</div>
      <div class="chat-box" id="chat-box"></div>
      <div class="input-box">
        <input type="text" id="message-input" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io("http://localhost:3000");

let studentId = '';
let currentChat = '';
let currentInternName = '';

// Get logged-in user from session
async function getLoggedInUser() {
  try {
    const res = await fetch('/api/profile');
    if (!res.ok) {
      window.location.href = '/';
      return;
    }
    const user = await res.json();
    studentId = user._id;
  } catch (err) {
    console.error('Profile error:', err);
  }
}

// Load accepted interns
async function loadConnectedInterns() {
  try {
    const res = await fetch('/api/myrequests');
    if (!res.ok) throw new Error('Failed to load requests');

    const requests = await res.json();

    const accepted = requests.filter(r => r.status === 'Accepted');

    const list = document.getElementById('intern-list');
    list.innerHTML = '';

    if (accepted.length === 0) {
      list.innerHTML = '<li>No accepted connections yet.</li>';
      return;
    }

    accepted.forEach(req => {
      const li = document.createElement('li');
      li.textContent = req.receiverName;
      li.classList.add('student-item');
      li.style.cursor = 'pointer';

      li.onclick = () => openChat({
  _id: req.receiverId,
  name: req.receiverName
}, li);

      list.appendChild(li);
    });

  } catch (err) {
    console.error('Error loading interns:', err);
    document.getElementById('intern-list').innerHTML =
      '<li>Error loading interns.</li>';
  }
}

// Open chat with selected intern
function openChat(intern, element) {

  // Remove old highlight
  document.querySelectorAll('.student-item')
    .forEach(item => item.classList.remove('active-chat'));

  // Highlight selected
  if (element) {
    element.classList.add('active-chat');
  }

  currentChat = intern._id;
  currentInternName = intern.name;

  document.getElementById('chat-title').innerText =
    `Chat with ${intern.name}`;

  const chatBox = document.getElementById('chat-box');
  chatBox.innerHTML = '';

  socket.emit('joinRoom', {
    senderId: studentId,
    receiverId: currentChat
  });

  fetch(`/api/messages/${studentId}/${currentChat}`)
    .then(res => res.json())
    .then(messages => {
      messages.forEach(msg => {
        const div = document.createElement('div');
        div.className =
          msg.senderId === studentId
            ? 'message sent'
            : 'message received';

        div.innerHTML = msg.message;
        chatBox.appendChild(div);
      });

      chatBox.scrollTop = chatBox.scrollHeight;
    });
}

// Send message
function sendMessage() {
  const input = document.getElementById('message-input');
  const message = input.value.trim();

  if (message === '' || currentChat === '') return;

  socket.emit('sendMessage', {
    senderId: studentId,
    receiverId: currentChat,
    message
  });
  input.value = '';
  chatBox.scrollTop = chatBox.scrollHeight;
}

// Receive message
socket.on('receiveMessage', (data) => {

  // Only show if this message belongs to current open chat
  if (
    data.senderId !== currentChat &&
    data.receiverId !== currentChat
  ) return;

  const chatBox = document.getElementById('chat-box');

  const div = document.createElement('div');

  div.className =
    data.senderId === studentId
      ? 'message sent'
      : 'message received';

  div.innerHTML =data.message;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
});
function getQueryParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    id: params.get("id"),
    name: params.get("name")
  };
}
// Page load
window.onload = async () => {
  await getLoggedInUser();
  await loadConnectedInterns();

  const internData = getQueryParams();

  // If opened from "Chat" button
  if (internData.id && internData.name) {
    openChat({
      _id: internData.id,
      name: internData.name
    });
  }
};
</script>

</body>
</html>
