<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile - InternConnect</title>
  <style>
    /* You can add your CSS here */
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f5f5f5;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #3498db;
      padding: 20px 30px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .logo-title {
      font-weight: bold;
      font-size: 22px;
      color: #ffffff;
      text-transform: uppercase;
    }

    .logo-subtext {
      font-size: 14px;
      color: #a69a95;
      margin-top: 5px;
    }

    nav a {
      color: #ffffff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #f1c40f;
    }
    .main {
      max-width: 600px;
      margin: 2rem auto;
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .profile-image {
      width: 80px;
      height: 80px;
      background: #007bff;
      color: white;
      font-size: 32px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin-bottom: 1rem;
    }
    .profile-details p {
      font-size: 1.1rem;
      margin: 0.5rem 0;
    }
    .edit-button {
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    footer {
      text-align: center;
      margin: 3rem 0 1rem;
      color: #666;
    }
  </style>
</head>
<body>

  <nav>
    <div>
      <div class="logo-title">InternConnect</div>
      <div class="logo-subtext">Learn. Connect. Succeed.</div>
    </div>
    <div>
      <a href="#" id="homeLink">Home</a>
      <a href="#" id="requestLink">My Requests</a>
      <a href="#" id="chatLink">Chats</a>
      <a href="post_internship.html" id="postInternshipLink" style="display:none">Post Internship</a>
      <a href="internships.html" id="internshipsLink" style="display:none">InternOpenings</a>

      <a href="profile.html">Profile</a>
      <a href="/logout">Logout</a>
    </div>
  </nav>

  <div class="main">
    <div class="profile-container">
      <div class="profile-image" id="profile-initials">?</div>
      <div class="profile-details">
        <p><strong>Name:</strong> <span id="name">Loading...</span></p>
        <p><strong>Branch:</strong> <span id="branch">Loading...</span></p>
        <p><strong>Year:</strong> <span id="year">Loading...</span></p>
        <p><strong>Email:</strong> <span id="email">Loading...</span></p>
        <p id="internshipRow">
  <strong>Internship:</strong> <span id="internship">Loading...</span>
</p>
        <button class="edit-button" onclick="alert('Edit feature coming soon!')">Edit Profile</button>
      </div>
    </div>
  </div>

  <footer>
    InternConnect © 2025 | All rights reserved.
  </footer>

  <script>
    // Fetch profile from the API
    fetch('/api/profile')
      .then(res => {
        if (!res.ok) {
          // If unauthorized or error, redirect to login
          window.location.href = '/login.html';
          return;
        }
        return res.json();
      })
      .then(user => {
        if (!user) return;

        document.getElementById('name').textContent = user.name;
        document.getElementById('branch').textContent = user.branch || 'N/A';
        document.getElementById('year').textContent = user.year || 'N/A';
        document.getElementById('email').textContent = user.email;
        const internshipRow = document.getElementById('internshipRow');

if (user.role === 'intern' && user.internship) {
  const internshipText = `${user.internship.internRole || ''} at ${user.internship.company || ''}`.trim();
  document.getElementById('internship').textContent = internshipText || 'N/A';
} else {
  // Hide internship row for students
  internshipRow.style.display = 'none';
}
        const initials = user.name.split(" ").map(n => n[0]).join("").toUpperCase();
        document.getElementById('profile-initials').textContent = initials;
      })
      .catch(() => {
        window.location.href = '/login.html';
      });
      
async function setNavigationByRole() {
  try {
    const res = await fetch('/api/profile');
    if (!res.ok) {
      window.location.href = '/login.html';
      return;
    }

    const user = await res.json();

    const homeLink = document.getElementById('homeLink');
    const chatLink = document.getElementById('chatLink');
    const requestLink = document.getElementById('requestLink');

    const postInternshipLink = document.getElementById('postInternshipLink');
    const internshipsLink = document.getElementById('internshipsLink');

    if (user.role === 'intern') {

      // Intern navigation
      homeLink.href = 'intern home.html';
      chatLink.href = 'intern_chat.html';
      requestLink.href = 'my_requests.html';

      postInternshipLink.style.display = 'inline';

    } else {

      // Student navigation
      homeLink.href = 'homepage.html';
      chatLink.href = 'chat.html';
      requestLink.href = 'myrequests.html';

      internshipsLink.style.display = 'inline';
    }

  } catch (err) {
    console.error('Navigation setup failed:', err);
    window.location.href = '/login.html';
  }
}

document.addEventListener('DOMContentLoaded', setNavigationByRole);

  </script>
  

</body>
</html>
