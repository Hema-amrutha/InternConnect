<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Profile</title>
  <style>
    body {
      background-color: #f4f8fb;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 50px;
    }
    .profile-card {
      background-color: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 600px;
      display: flex;
      align-items: center;
      gap: 30px;
    }
    .profile-pic {
      background-color: #007bba;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      color: white;
      font-size: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    .profile-details p {
      display: flex;
      flex-direction: column;
      justify-content: center;
      font-size: 18px;
      line-height: 1.7;
    }
    .profile-details span {
      font-weight: bold;
      color: #005a9e;
    }
  </style>
</head>
<body>

  <div class="profile-card">
    <div class="profile-pic" id="initials">DJ</div>
    <div class="profile-details" id="profileContent">
      <!-- JS Will Fill This -->
    </div>
  </div>
<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

console.log("Student ID:", id);

if (!id) {
  document.getElementById("profileContent").innerHTML = "<p>No ID provided.</p>";
} else {
  fetch(`/api/students/${id}`)   // ✅ student API
    .then(res => {
      if (!res.ok) throw new Error("Not found");
      return res.json();
    })
    .then(student => {
      const initials = student.name
        ? student.name.split(" ").map(w => w[0]).join("").toUpperCase()
        : "ST";

      document.getElementById("initials").innerText = initials;

      document.getElementById("profileContent").innerHTML = `
        <p><span>Name:</span> ${student.name || "N/A"}</p>
        <p><span>Email:</span> ${student.email || "N/A"}</p>
        <p><span>Branch:</span> ${student.branch || "N/A"}</p>
        <p><span>Year:</span> ${student.year || "N/A"}</p>
      `;
    })
    .catch(err => {
      console.error(err);
      document.getElementById("profileContent").innerHTML = "<p>Profile not found.</p>";
    });
}
</script>
</body>
</html>
